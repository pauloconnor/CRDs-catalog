# CRD Source Registry
# Maps each CRD API group directory to its upstream source repository.
#
# Fields:
#   url:            GitHub repository URL
#   source_type:    github | helm | package
#   fetch_strategy: How to obtain CRD YAML files:
#     - release_asset: Download a named asset from the latest GitHub release
#     - repo_path:     Fetch YAML files from a directory in the repo at the latest tag
#     - release_url:   Download from a URL template (use {version} placeholder)
#     - kustomize:     Run kustomize build on a repo path at the latest tag
#   groups:         List of CRD API group directories this source provides
#   changelog:      URL to release notes / changelog
#
# The update_crds.py script reads this file and automates pulling the latest CRDs.

sources:

  # ---------------------------------------------------------------------------
  # Google Cloud Config Connector
  # All *.cnrm.cloud.google.com groups plus related GCP groups
  # ---------------------------------------------------------------------------
