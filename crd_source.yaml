# CRD Source Registry
# Each entry points to an upstream GitHub repository containing CRD definitions.
# API groups are discovered automatically at runtime from spec.group in each CRD,
# so new groups added upstream are picked up without changes to this file.
#
# Fields:
#   url:            GitHub repository URL
#   tag:            Last processed release tag (managed by update_crds.py).
#                   Set to "" for first run. The script skips sources whose
#                   upstream tag matches this value and bumps it after a
#                   successful update.
#   fetch_strategy: How to obtain CRD YAML files (default: repo_path):
#     - repo_path:     Fetch YAML files from a directory at the latest release tag
#     - release_asset:  Download a named asset from the latest GitHub release
#     - release_url:   Download from a URL template (use {version} placeholder)
#   repo_path:      Directory in the repo containing CRD YAML files
#   asset_name:     Release asset filename (for release_asset strategy)
#   url_template:   URL with {version} placeholder (for release_url strategy)
#   changelog:      URL to release notes / changelog
#
# The update_crds.py script reads this file, fetches CRDs, converts to JSON
# schema, and places them into directories named after each spec.group.

