name: Update CRD Schemas

on:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      source_filter:
        description: 'Only process sources matching this substring (leave empty for all)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no file changes or PR)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update_crds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run CRD updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--create-pr --parallel 4"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi

          if [ -n "${{ github.event.inputs.source_filter }}" ]; then
            ARGS="$ARGS --source '${{ github.event.inputs.source_filter }}'"
          fi

          python Utilities/update_crds.py $ARGS
